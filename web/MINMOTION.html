<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINMOTION</title>
    <meta name="color-scheme" content="light dark">
    <script src="libs/gsap/gsap.min.js"></script>
    <script src="libs/gsap/SplitText.min.js"></script>
    <script src="libs/gsap/TextPlugin.min.js"></script>
    <script src="libs/gsap/Draggable.min.js"></script>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <input type="file" id="file-import" accept=".bmtp,.json" style="display:none;">

    <!-- FLOATING LEFT ACTIONS (File management) -->
    <div class="left-actions-container">
        <button type="button" id="btn-toggle-sidebar" data-i18n-title="btnToggleSidebarTitle" title="Скрыть/показать кнопки файлов">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block;">
                <rect x="2" y="2" width="12" height="12" rx="0" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="6" y1="2" x2="6" y2="14" stroke="currentColor" stroke-width="2"/>
            </svg>
        </button>
        <div class="file-actions-stack hidden">
            <button type="button" id="btn-import-json" data-i18n="btnOpen">📂 ОТКРЫТЬ</button>
            <button type="button" id="btn-export-json" data-i18n="btnSave">💾 СОХРАНИТЬ</button>
            <button type="button" id="btn-export-video" data-i18n-title="btnExportVideoTitle" data-i18n="btnExportVideo" title="Экспорт видео" style="font-weight:bold;">🎬 ЭКСПОРТ</button>
        </div>
        <div style="font-size: 9px; opacity: 0.4; pointer-events: none; align-self: flex-start; margin-left: 2px; font-weight: bold;">v0.1.30</div>
    </div>

    <!-- FLOATING RIGHT ACTIONS (UI controls) -->
    <div class="right-actions-container">
        <button type="button" id="btn-fullscreen" data-i18n-title="btnFullscreenTitle" title="Полный экран">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block;">
                <path d="M2 5V2h3m6 0h3v3m0 6v3h-3M5 14H2v-3" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
        </button>
        <button type="button" id="btn-toggle-ui" data-i18n-title="btnToggleUITitle" title="Скрыть/показать интерфейс [H]">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block;">
                <rect x="2" y="2" width="12" height="12" rx="0" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-dasharray="1 1" stroke-width="2"/>
                <line x1="6" y1="2" x2="6" y2="10" stroke="currentColor" stroke-dasharray="1 1" stroke-width="2"/>
            </svg>
        </button>
        <button type="button" id="btn-settings" data-i18n-title="btnSettingsTitle" title="Настройки">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block;">
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z" fill="currentColor"/>
                <path d="M9.4 1c-.2-.6-.7-1-1.4-1s-1.2.4-1.4 1l-.3.8c-.4.2-.8.4-1.2.7l-.8-.4c-.6-.3-1.3-.1-1.6.4l-1.2 2c-.3.5-.1 1.3.4 1.6l.8.4c0 .2-.1.5-.1.7s0 .5.1.7l-.8.4c-.5.3-.7 1-.4 1.6l1.2 2c.3.5 1 .7 1.6.4l.8-.4c.4.3.8.5 1.2.7l.3.8c.2.6.7 1 1.4 1s1.2-.4 1.4-1l.3-.8c.4-.2.8-.4 1.2-.7l.8.4c.6.3 1.3.1 1.6-.4l1.2-2c.3-.5.1-1.3-.4-1.6l-.8-.4c0-.2.1-.5.1-.7s0-.5-.1-.7l.8-.4c.5-.3.7-1 .4-1.6l-1.2-2c-.3-.5-1-.7-1.6-.4l-.8.4c-.4-.3-.8-.5-1.2-.7l-.3-.8zm-1.4 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z" fill="currentColor"/>
            </svg>
        </button>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-title" data-i18n="settingsTitle">НАСТРОЙКИ</div>
        <div class="settings-row">
            <span data-i18n="themeLabel">ТЕМА</span>
            <div class="settings-toggle-group">
                <button type="button" id="btn-theme-light" class="active" data-i18n="themeLight">СВЕТЛАЯ</button>
                <button type="button" id="btn-theme-dark" data-i18n="themeDark">ТЁМНАЯ</button>
            </div>
        </div>
        <div class="settings-row">
            <span data-i18n="langLabel">ЯЗЫК</span>
            <div class="settings-toggle-group">
                <button type="button" id="btn-lang-ru" class="active">RU</button>
                <button type="button" id="btn-lang-en">EN</button>
            </div>
        </div>
    </div>

    <aside class="sidebar" id="main-sidebar">
        <!-- ОСНОВНОЕ -->
        <div class="control-group" data-i18n-title="groupMain">
            <label class="trackable" data-key="text">
                <span class="trackable-label-row"><span data-i18n="paramText">Текст</span><button type="button" class="tl-dot sidebar-dot" data-param="text"></button></span>
                <textarea id="ctrl-text" rows="3">MINMOTION</textarea>
            </label>
            <div class="ui-row">
                <label class="trackable" data-key="textReveal" style="flex:2;">
                    <span class="trackable-label-row"><span data-i18n="paramReveal">Раскрытие (0–100%)</span><button type="button" class="tl-dot sidebar-dot" data-param="textReveal"></button></span>
                    <div class="slider-row">
                        <input type="range" id="ctrl-text-reveal" min="0" max="100" value="100">
                        <input type="number" id="ctrl-text-reveal-num" class="small-num" min="0" max="100" value="100">
                    </div>
                </label>
                <label class="trackable" data-key="revealMode" style="flex:1;">
                    <span class="trackable-label-row"><span data-i18n="paramRevealMode">Режим</span><button type="button" class="tl-dot sidebar-dot" data-param="revealMode"></button></span>
                    <select id="ctrl-reveal-mode">
                        <option value="char" data-i18n="paramRevealModeChar">Символы</option>
                        <option value="word" data-i18n="paramRevealModeWord">Слова</option>
                        <option value="line" data-i18n="paramRevealModeLine">Абзацы</option>
                    </select>
                </label>
            </div>
            <label class="trackable" data-key="randomHide">
                <span class="trackable-label-row"><span data-i18n="paramRandomHide">Случайное скрытие (0–100%)</span><button type="button" class="tl-dot sidebar-dot" data-param="randomHide"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-random-hide" min="0" max="100" value="0">
                    <input type="number" id="ctrl-random-hide-num" class="small-num" min="0" max="100" value="0">
                </div>
            </label>
            <label class="trackable" data-key="seed">
                <span class="trackable-label-row"><span data-i18n="paramSeedStatic">Сид случайностей</span><button type="button" class="tl-dot sidebar-dot" data-param="seed"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-seed" min="0" max="99999" step="1" value="42">
                    <input type="number" id="ctrl-seed-num" class="small-num" min="0" max="99999" value="42">
                </div>
            </label>
        </div>
        <hr>
        <!-- ТИПОГРАФИКА -->
        <div class="control-group" data-i18n-title="groupTypo">
            <div class="trackable" data-key="font" style="display: flex; flex-direction: column; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; gap: 4px;">
                <span class="trackable-label-row"><span data-i18n="paramFont">Шрифт</span><button type="button" class="tl-dot sidebar-dot" data-param="font"></button></span>
                <div class="font-dropdown-wrapper">
                    <div class="font-dropdown-trigger" id="font-dropdown-trigger">
                        <span id="font-dropdown-label">PT Sans</span>
                        <span class="font-dropdown-arrow">▼</span>
                    </div>
                    <div class="font-dropdown-panel" id="font-dropdown-panel">
                        <div class="font-search-row">
                            <input type="text" id="ctrl-font-search" data-i18n-placeholder="paramFontSearch" placeholder="Поиск шрифта..." autocomplete="off">
                        </div>
                        <div class="font-options-list" id="font-options-list">
                            <div class="font-option selected" data-value="'PT Sans', sans-serif">PT Sans</div>
                            <div class="font-option" data-value="'Inter', sans-serif">Inter</div>
                            <div class="font-option" data-value="'Courier New', Courier, monospace">Courier New</div>
                            <div class="font-option" data-value="Impact, fantasy">Impact</div>
                            <div class="font-option" data-value="Arial, sans-serif">Arial</div>
                        </div>
                    </div>
                </div>
                <select id="ctrl-font" style="display:none;"><option value="'PT Sans', sans-serif" selected>PT Sans</option><option value="'Inter', sans-serif">Inter</option><option value="'Courier New', Courier, monospace">Courier New</option><option value="Impact, fantasy">Impact</option><option value="Arial, sans-serif">Arial</option></select>
            </div>
            <label class="trackable" data-key="randomFont">
                <span class="trackable-label-row"><span data-i18n="paramRandomFontMode">Случайный шрифт</span><button type="button" class="tl-dot sidebar-dot" data-param="randomFont"></button></span>
                <select id="ctrl-random-font">
                    <option value="none" data-i18n="paramRandomFontNone">Нет</option>
                    <option value="words" data-i18n="paramRandomFontWords">По словам</option>
                    <option value="chars" data-i18n="paramRandomFontChars">По символам</option>
                </select>
            </label>
            <div id="random-font-list-section" style="display:none;">
                <div class="font-list-container trackable" data-key="fontList" id="font-list-container"></div>
                <button type="button" id="add-font-btn" style="width:100%; margin-top:5px;" data-i18n="paramRandomFontAddFont">+ ДОБАВИТЬ ШРИФТ</button>
            </div>
            <label class="trackable" data-key="fontsize">
                <span class="trackable-label-row"><span data-i18n="paramFontsize">Размер шрифта</span><button type="button" class="tl-dot sidebar-dot" data-param="fontsize"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-fontsize" min="10" max="300" value="60">
                    <input type="number" id="ctrl-fontsize-num" class="small-num" min="10" max="300" value="60">
                </div>
            </label>
            <label class="trackable" data-key="tracking">
                <span class="trackable-label-row"><span data-i18n="paramTracking">Трекинг</span><button type="button" class="tl-dot sidebar-dot" data-param="tracking"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-tracking" min="-10" max="100" value="2">
                    <input type="number" id="ctrl-tracking-num" class="small-num" min="-10" max="100" value="2">
                </div>
            </label>
            <label class="trackable" data-key="spacing">
                <span class="trackable-label-row"><span data-i18n="paramSpacing">Межсловный интервал</span><button type="button" class="tl-dot sidebar-dot" data-param="spacing"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-spacing" min="0" max="150" value="20">
                    <input type="number" id="ctrl-spacing-num" class="small-num" min="0" max="150" value="20">
                </div>
            </label>
            <label class="trackable" data-key="lineheight">
                <span class="trackable-label-row"><span data-i18n="paramLineheight">Межстрочный интервал</span><button type="button" class="tl-dot sidebar-dot" data-param="lineheight"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-lineheight" min="0.8" max="3" step="0.1" value="1.2">
                    <input type="number" id="ctrl-lineheight-num" class="small-num" min="0.8" max="3" step="0.1" value="1.2">
                </div>
            </label>
            <label class="checkbox-label trackable" data-key="bgFit" style="margin-top:-5px; margin-bottom:10px;">
                <input type="checkbox" id="ctrl-bg-fit" checked>
                <span data-i18n="paramBgFit">Адаптивный фон строки</span>
                <button type="button" class="tl-dot sidebar-dot" data-param="bgFit" style="margin-left: auto;"></button>
            </label>
            <button type="button" id="btn-reset-spacing" style="width:100%; margin-bottom: 10px; font-size: 11px;" data-i18n="paramResetSpacing">СБРОСИТЬ ОТСТУПЫ</button>
            <div class="ui-row">
                <label class="trackable" data-key="align" style="flex:1;">
                    <span class="trackable-label-row"><span data-i18n="paramAlignH">Выравнивание (гор.)</span><button type="button" class="tl-dot sidebar-dot" data-param="align"></button></span>
                    <select id="ctrl-align">
                        <option value="center" data-i18n="paramAlignCenter">По центру</option>
                        <option value="left" data-i18n="paramAlignLeft">Слева</option>
                        <option value="right" data-i18n="paramAlignRight">Справа</option>
                        <option value="justify" data-i18n="paramAlignJustify">По ширине</option>
                    </select>
                </label>
                <label class="trackable" data-key="alignV" style="flex:1;">
                    <span class="trackable-label-row"><span data-i18n="paramAlignV">Выравнивание (верт.)</span><button type="button" class="tl-dot sidebar-dot" data-param="alignV"></button></span>
                    <select id="ctrl-align-v">
                        <option value="center" data-i18n="paramAlignVCenter">По центру</option>
                        <option value="flex-start" data-i18n="paramAlignVTop">Сверху</option>
                        <option value="flex-end" data-i18n="paramAlignVBottom">Снизу</option>
                    </select>
                </label>
            </div>
        </div>
        <hr>
        <!-- ЦВЕТ И ФОН -->
        <div class="control-group" data-i18n-title="groupColor">
            <div class="ui-row">
                <label class="trackable" data-key="cText" style="flex:1;">
                    <span class="trackable-label-row"><span data-i18n="paramCText">Цвет текста</span><button type="button" class="tl-dot sidebar-dot" data-param="cText"></button></span>
                    <div class="color-input-wrap">
                        <input type="color" id="ctrl-color-text" value="#000000">
                        <input type="text" id="ctrl-color-text-hex" class="hex-input" value="#000000" maxlength="7" spellcheck="false">
                    </div>
                </label>
                <label class="trackable" data-key="cTextBg" style="flex:1;">
                    <span class="trackable-label-row"><span data-i18n="paramCTextBg">Фон слова</span><button type="button" class="tl-dot sidebar-dot" data-param="cTextBg"></button></span>
                    <div class="color-input-wrap">
                        <input type="color" id="ctrl-color-text-bg" value="#ffffff">
                        <input type="text" id="ctrl-color-text-bg-hex" class="hex-input" value="#ffffff" maxlength="7" spellcheck="false">
                    </div>
                </label>
                <label class="trackable" data-key="cStroke" style="flex:1;">
                    <span class="trackable-label-row"><span data-i18n="paramCStroke">Цвет обводки</span><button type="button" class="tl-dot sidebar-dot" data-param="cStroke"></button></span>
                    <div class="color-input-wrap">
                        <input type="color" id="ctrl-color-stroke" value="#000000">
                        <input type="text" id="ctrl-color-stroke-hex" class="hex-input" value="#000000" maxlength="7" spellcheck="false">
                    </div>
                </label>
            </div>
            <label class="trackable" data-key="cBg">
                <span class="trackable-label-row"><span data-i18n="paramCBg">Фон холста</span><button type="button" class="tl-dot sidebar-dot" data-param="cBg"></button></span>
                <div class="color-input-wrap">
                    <input type="color" id="ctrl-color-bg" value="#e0e0e0">
                    <input type="text" id="ctrl-color-bg-hex" class="hex-input" value="#e0e0e0" maxlength="7" spellcheck="false">
                </div>
            </label>
            <hr class="section-hr">
            <label class="trackable" data-key="pattern">
                <span class="trackable-label-row"><span data-i18n="paramPattern">Паттерн (Фон)</span><button type="button" class="tl-dot sidebar-dot" data-param="pattern"></button></span>
                <select id="ctrl-pattern">
                    <option value="none" data-i18n="paramPatternNone">Нет</option>
                    <option value="odd" data-i18n="paramPatternOdd">Нечётные</option>
                    <option value="even" data-i18n="paramPatternEven">Чётные</option>
                    <option value="every3" data-i18n="paramPatternEvery3">Каждое третье</option>
                    <option value="random" data-i18n="paramPatternRandom">Случайно (Сид)</option>
                </select>
            </label>
            <label class="trackable" data-key="seedPattern">
                <span class="trackable-label-row"><span data-i18n="paramSeedPattern">Сид паттерна</span><button type="button" class="tl-dot sidebar-dot" data-param="seedPattern"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-seed-pattern" min="0" max="99999" step="1" value="12345">
                    <input type="number" id="ctrl-seed-pattern-num" class="small-num" min="0" max="99999" value="12345">
                </div>
            </label>
            <label>
                <span class="trackable-label-row"><span data-i18n="paramPalette">Палитра выделения</span><button type="button" class="tl-dot sidebar-dot" data-param="palette"></button></span>
            </label>
            <div class="palette-list trackable" data-key="palette" id="palette-container"></div>
            <button type="button" id="add-color-btn" style="width:100%; margin-top: 14px;" data-i18n="paramAddColor">+ ДОБАВИТЬ ЦВЕТ</button>
        </div>
        <hr>
        <!-- ГРАДИЕНТ ВЫДЕЛЕНИЯ -->
        <div class="control-group" data-i18n-title="groupGradient">
            <label class="checkbox-label trackable" data-key="textGradient">
                <input type="checkbox" id="ctrl-gradient-enabled">
                <span data-i18n="paramGradientEnabled">Включить градиент</span>
                <button type="button" class="tl-dot sidebar-dot" data-param="textGradient" style="margin-left:auto;"></button>
            </label>
            <div id="gradient-settings" style="display:none;">
                <div class="ui-row" style="margin-bottom:8px;">
                    <label style="flex:1; margin-bottom:0;">
                        <span data-i18n="paramGradientType">Тип</span>
                        <select id="ctrl-gradient-type">
                            <option value="linear" data-i18n="paramGradientTypeLinear">Линейный</option>
                            <option value="radial" data-i18n="paramGradientTypeRadial">Радиальный</option>
                        </select>
                    </label>
                    <label style="flex:1; margin-bottom:0;">
                        <span data-i18n="paramGradientMode">Применить к</span>
                        <select id="ctrl-gradient-mode">
                            <option value="words" data-i18n="paramGradientModeWords">Словам</option>
                            <option value="chars" data-i18n="paramGradientModeChars">Символам</option>
                        </select>
                    </label>
                </div>
                <label style="margin-bottom:6px;">
                    <span data-i18n="paramGradientInterp">Интерполяция</span>
                    <div class="settings-toggle-group" style="margin-top:4px;">
                        <button type="button" id="btn-grad-interp-linear" class="active" data-i18n="paramGradientInterpLinear">Плавная</button>
                        <button type="button" id="btn-grad-interp-const" data-i18n="paramGradientInterpConst">Резкая</button>
                    </div>
                </label>
                <div class="gradient-strip-wrap">
                    <div id="gradient-strip" class="gradient-strip"></div>
                    <div id="gradient-stops-bar" class="gradient-stops-bar"></div>
                </div>
                <button type="button" id="add-gradient-stop-btn" style="width:100%; margin-top:14px;" data-i18n="paramGradientAddStop">+ ДОБАВИТЬ ЦВЕТ</button>
                <button type="button" id="btn-keyframe-all-stops" style="width:100%; margin-top:8px;" data-i18n="paramGradientKeyAll">● ЗАПИСАТЬ ВСЕ ФЛАГИ</button>
                <div id="gradient-canvas-ui" class="gradient-canvas-ui">
                    <!-- Линейный: угол + центр -->
                    <div id="gradient-linear-ui" class="gradient-linear-ui" style="width:100%;">
                        <span class="trackable" data-key="gradAngle" style="display:contents;"><canvas id="gradient-angle-canvas" width="200" height="80" style="width:100%;"></canvas></span>
                        <label style="margin:0; font-size:11px; flex-direction:row; align-items:center; gap:4px;">
                            <span class="trackable-label-row">° <button type="button" class="tl-dot sidebar-dot" data-param="gradAngle"></button></span>
                            <input type="number" id="ctrl-gradient-angle" class="small-num" min="0" max="360" value="90" style="width:50px;">
                        </label>
                        <div style="display:flex; gap:8px; margin-top:6px;">
                            <label class="trackable" data-key="gradLx" style="flex:1; margin:0; font-size:11px;">
                                <span class="trackable-label-row">X<button type="button" class="tl-dot sidebar-dot" data-param="gradLx"></button></span>
                                <div class="slider-row">
                                    <input type="range" id="ctrl-grad-lx" min="0" max="100" step="1" value="50">
                                    <input type="number" id="ctrl-grad-lx-num" class="small-num" min="0" max="100" step="1" value="50" style="width:42px;">
                                </div>
                            </label>
                            <label class="trackable" data-key="gradLy" style="flex:1; margin:0; font-size:11px;">
                                <span class="trackable-label-row">Y<button type="button" class="tl-dot sidebar-dot" data-param="gradLy"></button></span>
                                <div class="slider-row">
                                    <input type="range" id="ctrl-grad-ly" min="0" max="100" step="1" value="50">
                                    <input type="number" id="ctrl-grad-ly-num" class="small-num" min="0" max="100" step="1" value="50" style="width:42px;">
                                </div>
                            </label>
                        </div>
                    </div>
                    <!-- Радиальный: центр + радиус -->
                    <div id="gradient-radial-ui" class="gradient-radial-ui" style="display:none; width:100%;">
                        <span class="trackable" data-key="gradCx" style="display:contents;"><canvas id="gradient-radial-canvas" width="200" height="80" style="width:100%;"></canvas></span>
                        <div style="font-size:10px; opacity:0.7; margin-top:4px;" data-i18n="radialCenterRadius">● Центр / ○ Радиус</div>
                        <div style="display:flex; gap:8px; margin-top:6px;">
                            <label class="trackable" data-key="gradCx" style="flex:1; margin:0; font-size:11px;">
                                <span class="trackable-label-row">CX<button type="button" class="tl-dot sidebar-dot" data-param="gradCx"></button></span>
                                <div class="slider-row">
                                    <input type="range" id="ctrl-grad-cx" min="0" max="100" step="1" value="50">
                                    <input type="number" id="ctrl-grad-cx-num" class="small-num" min="0" max="100" step="1" value="50" style="width:42px;">
                                </div>
                            </label>
                            <label class="trackable" data-key="gradCy" style="flex:1; margin:0; font-size:11px;">
                                <span class="trackable-label-row">CY<button type="button" class="tl-dot sidebar-dot" data-param="gradCy"></button></span>
                                <div class="slider-row">
                                    <input type="range" id="ctrl-grad-cy" min="0" max="100" step="1" value="50">
                                    <input type="number" id="ctrl-grad-cy-num" class="small-num" min="0" max="100" step="1" value="50" style="width:42px;">
                                </div>
                            </label>
                        </div>
                        <label class="trackable" data-key="gradCr" style="margin-top:6px; font-size:11px;">
                            <span class="trackable-label-row">Радиус<button type="button" class="tl-dot sidebar-dot" data-param="gradCr"></button></span>
                            <div class="slider-row">
                                <input type="range" id="ctrl-grad-cr" min="0.05" max="2" step="0.01" value="0.5">
                                <input type="number" id="ctrl-grad-cr-num" class="small-num" min="0.05" max="2" step="0.01" value="0.5" style="width:42px;">
                            </div>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <hr>
        <!-- ОБВОДКА И ГРАНИЦЫ -->
        <div class="control-group" data-i18n-title="groupStroke">
            <label class="checkbox-label trackable" data-key="sWord"><input type="checkbox" id="ctrl-stroke-word"> <span data-i18n="paramSWord">Обводка слов</span> <button type="button" class="tl-dot sidebar-dot" data-param="sWord" style="margin-left: auto;"></button></label>
            <label class="trackable" data-key="sWordW" style="margin-left: 25px; margin-top: -5px;">
                <span class="trackable-label-row"><span data-i18n="paramSWordW">Толщина (слова)</span><button type="button" class="tl-dot sidebar-dot" data-param="sWordW"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-stroke-word-w" min="0.1" max="20" step="0.1" value="2">
                    <input type="number" id="ctrl-stroke-word-w-num" class="small-num" min="0.1" max="20" step="0.1" value="2">
                </div>
            </label>
            <label class="checkbox-label trackable" data-key="sChar"><input type="checkbox" id="ctrl-stroke-char"> <span data-i18n="paramSChar">Обводка символов</span> <button type="button" class="tl-dot sidebar-dot" data-param="sChar" style="margin-left: auto;"></button></label>
            <label class="trackable" data-key="sCharW" style="margin-left: 25px; margin-top: -5px;">
                <span class="trackable-label-row"><span data-i18n="paramSCharW">Толщина (символы)</span><button type="button" class="tl-dot sidebar-dot" data-param="sCharW"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-stroke-char-w" min="0.1" max="20" step="0.1" value="1">
                    <input type="number" id="ctrl-stroke-char-w-num" class="small-num" min="0.1" max="20" step="0.1" value="1">
                </div>
            </label>
            <label class="checkbox-label trackable" data-key="remSpaces"><input type="checkbox" id="ctrl-remove-spaces"> <span data-i18n="paramRemSpaces">Без пробелов</span> <button type="button" class="tl-dot sidebar-dot" data-param="remSpaces" style="margin-left: auto;"></button></label>
            <label class="checkbox-label trackable" data-key="wrapText"><input type="checkbox" id="ctrl-wrap-text" checked> <span data-i18n="paramWrapText">Перенос текста</span> <button type="button" class="tl-dot sidebar-dot" data-param="wrapText" style="margin-left: auto;"></button></label>
            <label class="trackable" data-key="sWordRadius" style="margin-left: 25px; margin-top: 5px;">
                <span class="trackable-label-row"><span data-i18n="paramSWordRadius">Скругление (слова)</span><button type="button" class="tl-dot sidebar-dot" data-param="sWordRadius"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-stroke-word-radius" min="0" max="1" step="0.01" value="0">
                    <input type="number" id="ctrl-stroke-word-radius-num" class="small-num" min="0" max="1" step="0.01" value="0">
                </div>
            </label>
            <label class="trackable" data-key="sWordPadX" style="margin-left: 25px; margin-top: 5px;">
                <span class="trackable-label-row"><span data-i18n="paramSWordPadX">Отступ по горизонтали (слова)</span><button type="button" class="tl-dot sidebar-dot" data-param="sWordPadX"></button></span>
                <div class="slider-row">
                    <input type="range" id="ctrl-stroke-word-padx" min="0" max="1" step="0.01" value="0">
                    <input type="number" id="ctrl-stroke-word-padx-num" class="small-num" min="0" max="1" step="0.01" value="0">
                </div>
            </label>
        </div>
    </aside>

    <main class="canvas-container" id="canvas">
        <div id="render-box" class="trackable" data-key="boxW"></div>
    </main>

    <footer class="timeline" id="timeline-panel">
        <div id="timeline-resizer"></div>
        <div class="timeline-controls">
            <div class="control-group-btn">
                <button type="button" id="btn-go-start">|◀</button>
                <button type="button" id="btn-prev-kf">◀◀</button>
                <button type="button" id="btn-play-rev">◀</button>
                <button type="button" id="btn-play">▶</button>
                <button type="button" id="btn-next-kf">▶▶</button>
                <button type="button" id="btn-go-end">▶|</button>
                <div style="width: 10px;"></div>
                <button type="button" id="btn-loop">🔁</button>
            </div>
            <div class="time-inputs">
                <label style="flex-direction: row; margin:0; align-items:center;" data-i18n="tlFrame">Кадр: <input type="number" id="timeline-frame" min="0" step="1" value="0"></label>
                <label style="flex-direction: row; margin:0; align-items:center;" data-i18n="tlTotal">Всего: <input type="number" id="ctrl-total-frames" class="small-num" min="1" step="1" value="300"></label>
                <label style="flex-direction: row; margin:0; align-items:center; color: var(--accent-color);" data-i18n="tlFps">FPS: <input type="number" id="ctrl-fps" class="small-num" min="1" max="120" step="1" value="30"></label>
                <label style="flex-direction: row; margin:0; align-items:center; margin-left: 10px;" data-i18n="tlZoom">Зум: <input type="range" id="ctrl-zoom" min="1" max="10" step="0.1" value="1" style="width: 80px;"></label>
            </div>
            <div class="tl-ease-presets" id="tl-ease-presets">
                <button type="button" id="btn-ease-linear" class="ease-preset-btn active" data-ease="linear" data-i18n="easeLinear">Линейный</button>
                <button type="button" id="btn-ease-inout" class="ease-preset-btn" data-ease="easeInOut" data-i18n="easeInOut">Ease In Out</button>
                <button type="button" id="btn-ease-const" class="ease-preset-btn" data-ease="const" data-i18n="easeConst">Резкий</button>
            </div>
        </div>
        <div class="timeline-body" id="tl-body">
            <div class="tl-content">
                <div class="tl-sidebar" id="tl-sidebar"></div>
                <div class="tl-tracks-wrapper" id="tracks">
                    <div class="timeline-grid" id="timeline-grid"></div>
                    <div id="selection-box"></div>
                    <div class="playhead" id="playhead"></div>
                </div>
            </div>
        </div>
    </footer>

    <!-- EXPORT MODAL -->
    <div id="export-modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9000; display:none; align-items:center; justify-content:center;">
        <div id="export-modal" style="background:var(--bg-color,#fff); border:1px solid var(--border-color,#ccc); border-radius:8px; padding:24px; min-width:340px; max-width:420px; width:90%; font-size:13px; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
            <div style="font-weight:bold; font-size:15px; margin-bottom:16px; letter-spacing:1px;" data-i18n="modalExportTitle">🎬 ЭКСПОРТ ВИДЕО</div>
            <div id="export-settings-section">
                <div style="display:flex; gap:12px; margin-bottom:12px;">
                    <label style="flex:1; margin:0;">
                        <span style="font-size:11px; opacity:0.7; display:block; margin-bottom:4px;" data-i18n="modalStartFrame">НАЧАЛЬНЫЙ КАДР</span>
                        <input type="number" id="exp-start-frame" min="0" step="1" value="0" style="width:100%; box-sizing:border-box;">
                    </label>
                    <label style="flex:1; margin:0;">
                        <span style="font-size:11px; opacity:0.7; display:block; margin-bottom:4px;" data-i18n="modalEndFrame">КОНЕЧНЫЙ КАДР</span>
                        <input type="number" id="exp-end-frame" min="0" step="1" value="300" style="width:100%; box-sizing:border-box;">
                    </label>
                </div>
                <div style="display:flex; gap:12px; margin-bottom:12px;">
                    <label style="flex:1; margin:0;">
                        <span style="font-size:11px; opacity:0.7; display:block; margin-bottom:4px;">FPS</span>
                        <input type="number" id="exp-fps" min="1" max="120" step="1" value="30" style="width:100%; box-sizing:border-box;">
                    </label>
                    <label style="flex:1; margin:0;">
                        <span style="font-size:11px; opacity:0.7; display:block; margin-bottom:4px;" data-i18n="modalFormat">ФОРМАТ</span>
                        <select id="exp-format" style="width:100%; box-sizing:border-box;">
                            <option value="mp4">MP4 (H.264)</option>
                            <option value="mov">MOV (ProRes)</option>
                        </select>
                    </label>
                </div>
                <div style="margin-bottom:16px;">
                    <span style="font-size:11px; opacity:0.7; display:block; margin-bottom:6px;" data-i18n="modalResolution">РАЗРЕШЕНИЕ</span>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <button type="button" id="exp-res-screen" style="flex:1; font-size:11px; padding:5px 8px;" class="active" data-i18n="modalResScreen">ЭКРАН</button>
                        <button type="button" id="exp-res-custom" style="flex:1; font-size:11px; padding:5px 8px;" data-i18n="modalResCustom">СВОЁ</button>
                    </div>
                    <div id="exp-res-custom-row" style="display:none; margin-top:8px; display:none; gap:8px;">
                        <input type="number" id="exp-width" min="1" step="1" value="1920" placeholder="W" style="flex:1; width:50%; box-sizing:border-box;">
                        <span style="align-self:center;">×</span>
                        <input type="number" id="exp-height" min="1" step="1" value="1080" placeholder="H" style="flex:1; width:50%; box-sizing:border-box;">
                    </div>
                    <div id="exp-res-info" style="font-size:11px; opacity:0.6; margin-top:6px;"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button type="button" id="exp-btn-start" style="flex:1; background:var(--accent-color,#00d4ff); color:#000; font-weight:bold; padding:8px;" data-i18n="modalBtnRender">▶ РЕНДЕР</button>
                    <button type="button" id="exp-btn-cancel-modal" style="flex:1; padding:8px;" data-i18n="modalBtnCancel">ОТМЕНА</button>
                </div>
            </div>
        </div>
    </div>

    <div id="context-menu">
        <div style="font-size:11px; color:#666;" id="ctx-title" data-i18n="ctxParam">Параметр</div>
        <label data-i18n="ctxValue">Значение: <input type="text" id="ctx-value"></label>
        <div class="ctx-buttons">
            <button type="button" id="ctx-save" style="background:var(--active-color); color:#000;" data-i18n="ctxSave">✓ СОХРАНИТЬ</button>
            <button type="button" id="ctx-delete" style="background:#ff0000; color:#fff;" data-i18n="ctxDelete">УДАЛИТЬ</button>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/functions.js"></script>
    <script src="js/events.js"></script>
    <script>
        initTimelineTracks();
        applyStateToDOM(getCurrentFullState());
        rebuildGSAPTimeline();
    </script>
</body>
</html>
